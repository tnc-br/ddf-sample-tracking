name: Deploy to Firebase Hosting on PR

"on": pull_request

jobs:
  build_and_preview:
    if: "${{ github.event.pull_request.head.repo.full_name == github.repository }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./sample_tracking/package-lock.json"

      - name: Criar arquivo .env.local
        run: |
          cd sample_tracking
          echo "NEXT_PUBLIC_API_KEY=${{ secrets.NEXT_PUBLIC_API_KEY }}" > .env.local
          echo "NEXT_PUBLIC_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_AUTH_DOMAIN }}" >> .env.local
          echo "NEXT_PUBLIC_PROJECT_ID=${{ secrets.NEXT_PUBLIC_PROJECT_ID }}" >> .env.local
          echo "NEXT_PUBLIC_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_STORAGE_BUCKET }}" >> .env.local
          echo "NEXT_PUBLIC_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_MESSAGING_SENDER_ID }}" >> .env.local
          echo "NEXT_PUBLIC_APP_ID=${{ secrets.NEXT_PUBLIC_APP_ID }}" >> .env.local
          echo "NEXT_PUBLIC_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_MEASUREMENT_ID }}" >> .env.local

      - name: Instalar dependências
        run: |
          cd sample_tracking
          npm ci

      - name: Build Next.js
        run: |
          cd sample_tracking
          npm run build

      - name: Deploy Preview to Firebase Hosting
        id: deploy_preview
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          entrypoint: ./sample_tracking
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_RIVER_SKY_386919 }}"
          projectId: river-sky-386919
          expires: 7d

      - name: Comentar na PR com link de preview
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy_preview.outputs.details_url }}';
            const comment = `
            ### ✅ Deploy Preview Pronto!

            🔗 **Preview URL:** ${previewUrl}

            📅 **Expira em:** 7 dias

            ---

            *Deploy realizado com sucesso! Você pode visualizar as mudanças no link acima.*
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
